<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrackMania Campaign Planet</title>
  <style>
    :root {
      --bg-1: #ffffff;
      --bg-2: #f6f8fb;
      --text-soft: rgba(216, 228, 239, 0.26);
      --text-soft-shadow: rgba(5, 8, 12, 0.65);
      --text-strong: rgba(238, 245, 251, 0.96);
      --text-strong-shadow: rgba(46, 74, 98, 0.65);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle at 50% 18%, #ffffff 0%, var(--bg-1) 42%, var(--bg-2) 100%);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #planet {
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
    }

    #planet:active {
      cursor: grabbing;
    }

    #labels {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .map-label {
      position: absolute;
      left: 0;
      top: 0;
      transform: translate(-50%, -50%);
      padding: 4px 8px;
      border-radius: 999px;
      white-space: nowrap;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: var(--text-soft);
      text-shadow: 0 0 10px var(--text-soft-shadow), 0 0 24px rgba(5, 8, 12, 0.55);
      opacity: 0.32;
      filter: blur(1.6px);
      transition:
        opacity 180ms ease,
        filter 180ms ease,
        color 180ms ease,
        text-shadow 180ms ease,
        transform 180ms ease,
        background 180ms ease;
      user-select: none;
      will-change: transform, opacity;
      background: rgba(11, 18, 25, 0.08);
      backdrop-filter: blur(2px);
    }

    .map-label.active {
      color: var(--text-strong);
      opacity: 0.98;
      filter: blur(0);
      text-shadow: 0 0 12px var(--text-strong-shadow), 0 0 30px rgba(131, 162, 190, 0.28);
      background: rgba(15, 25, 35, 0.28);
      transform: translate(-50%, -50%) scale(1.03);
    }

    .map-label.hidden {
      opacity: 0;
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="planet"></canvas>
    <div id="labels"></div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const WORDMARK_URL = 'https://upload.wikimedia.org/wikipedia/commons/thumb/d/d7/Logo_Trackmania.svg/1280px-Logo_Trackmania.svg.png';

    const CAMPAIGNS = [
      {
        id: 'tmn',
        name: 'TrackMania Nations',
        logoSubtitle: 'NATIONS',
        polygon: [
          { lat: 32, lon: -174 },
          { lat: 50, lon: -166 },
          { lat: 60, lon: -150 },
          { lat: 58, lon: -132 },
          { lat: 48, lon: -118 },
          { lat: 34, lon: -116 },
          { lat: 20, lon: -128 },
          { lat: 16, lon: -148 },
          { lat: 22, lon: -166 }
        ],
        labelShift: { lat: 8, lon: 0 },
        logoBias: { x: 0.0, y: 0.05 }
      },
      {
        id: 'tmnf',
        name: 'TrackMania Nations Forever',
        logoSubtitle: 'NATIONS FOREVER',
        polygon: [
          { lat: 54, lon: -58 },
          { lat: 66, lon: -42 },
          { lat: 68, lon: -18 },
          { lat: 60, lon: -2 },
          { lat: 44, lon: 2 },
          { lat: 30, lon: -8 },
          { lat: 24, lon: -28 },
          { lat: 30, lon: -48 },
          { lat: 42, lon: -58 }
        ],
        labelShift: { lat: 8, lon: 0 },
        logoBias: { x: 0.0, y: 0.02 }
      },
      {
        id: 'tmuf',
        name: 'TrackMania United Forever',
        logoSubtitle: 'UNITED FOREVER',
        polygon: [
          { lat: 18, lon: 30 },
          { lat: 34, lon: 44 },
          { lat: 40, lon: 68 },
          { lat: 36, lon: 92 },
          { lat: 22, lon: 110 },
          { lat: 4, lon: 108 },
          { lat: -8, lon: 90 },
          { lat: -8, lon: 58 },
          { lat: 4, lon: 36 }
        ],
        labelShift: { lat: 10, lon: 0 },
        logoBias: { x: 0.02, y: 0.02 }
      },
      {
        id: 'tms',
        name: 'TrackMania Sunrise',
        logoSubtitle: 'SUNRISE',
        polygon: [
          { lat: 6, lon: -120 },
          { lat: -8, lon: -100 },
          { lat: -24, lon: -90 },
          { lat: -42, lon: -88 },
          { lat: -56, lon: -102 },
          { lat: -58, lon: -124 },
          { lat: -46, lon: -138 },
          { lat: -24, lon: -140 },
          { lat: -6, lon: -132 }
        ],
        labelShift: { lat: 2, lon: -2 },
        logoBias: { x: 0.0, y: 0.02 }
      },
      {
        id: 'tmo',
        name: 'TrackMania Original',
        logoSubtitle: 'ORIGINAL',
        polygon: [
          { lat: 2, lon: 126 },
          { lat: 10, lon: 146 },
          { lat: 4, lon: 168 },
          { lat: -12, lon: 178 },
          { lat: -30, lon: 172 },
          { lat: -44, lon: 156 },
          { lat: -46, lon: 132 },
          { lat: -30, lon: 118 },
          { lat: -10, lon: 118 }
        ],
        labelShift: { lat: 2, lon: 0 },
        logoBias: { x: 0.02, y: 0.02 }
      }
    ];

    const canvas = document.getElementById('planet');
    const labelsLayer = document.getElementById('labels');

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0xf6f8fb, 0.025);

    const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0.55, 3.72);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = false;
    controls.enablePan = false;
    controls.minDistance = 2.1;
    controls.maxDistance = 5.8;
    controls.rotateSpeed = 1.15;
    controls.minPolarAngle = 0.67;
    controls.maxPolarAngle = 1.87;

    const dragState = {
      active: false,
      pointerId: null,
      lastX: 0,
      lastY: 0,
      lastTime: 0
    };

    let inertiaThetaVelocity = 0;
    let inertiaPhiVelocity = 0;
    const inertialSpherical = new THREE.Spherical();
    const inertialOffset = new THREE.Vector3();
    const INERTIA_DECAY = 0.5;
    const INERTIA_BOOST = 0.92;
    const INERTIA_THRESHOLD = 20;
    const MAX_INERTIA_VELOCITY = 10.5;

    function stopOrbitSpin() {
      inertiaThetaVelocity = 0;
      inertiaPhiVelocity = 0;
    }

    function signedBlend(currentVelocity, nextVelocity) {
      if (!currentVelocity) return nextVelocity;
      if (currentVelocity * nextVelocity < 0) return nextVelocity;
      return THREE.MathUtils.lerp(currentVelocity, nextVelocity, 0.42);
    }

    function angularVelocityFromPointerDelta(delta, viewportSize, dt) {
      if (!dt || !viewportSize) return 0;
      const angle = (2 * Math.PI * delta * controls.rotateSpeed) / viewportSize;
      return -angle / dt;
    }

    function updateInertialVelocity(event) {
      const now = performance.now();
      if (!dragState.lastTime) {
        dragState.lastX = event.clientX;
        dragState.lastY = event.clientY;
        dragState.lastTime = now;
        return;
      }

      const dt = Math.min((now - dragState.lastTime) / 1000, 0.05);
      const deltaX = event.clientX - dragState.lastX;
      const deltaY = event.clientY - dragState.lastY;
      dragState.lastX = event.clientX;
      dragState.lastY = event.clientY;
      dragState.lastTime = now;

      if (dt <= 0) return;

      const dx = Math.abs(deltaX);
      const dy = Math.abs(deltaY);
      if (dx < INERTIA_THRESHOLD && dy < INERTIA_THRESHOLD) return;

      const viewportSize = renderer.domElement.clientHeight || window.innerHeight;
      const nextThetaVelocity = angularVelocityFromPointerDelta(deltaX, viewportSize, dt);
      const nextPhiVelocity = angularVelocityFromPointerDelta(deltaY, viewportSize, dt);
      inertiaThetaVelocity = THREE.MathUtils.clamp(
        signedBlend(inertiaThetaVelocity, nextThetaVelocity) * INERTIA_BOOST,
        -MAX_INERTIA_VELOCITY,
        MAX_INERTIA_VELOCITY
      );
      inertiaPhiVelocity = THREE.MathUtils.clamp(
        signedBlend(inertiaPhiVelocity, nextPhiVelocity) * INERTIA_BOOST,
        -MAX_INERTIA_VELOCITY,
        MAX_INERTIA_VELOCITY
      );
    }

    function applyInertialSpin(deltaTime) {
      if (dragState.active) return;
      if (Math.abs(inertiaThetaVelocity) < 0.0001 && Math.abs(inertiaPhiVelocity) < 0.0001) return;

      inertialOffset.copy(camera.position).sub(controls.target);
      inertialSpherical.setFromVector3(inertialOffset);
      inertialSpherical.theta += inertiaThetaVelocity * deltaTime;
      inertialSpherical.phi = THREE.MathUtils.clamp(
        inertialSpherical.phi + inertiaPhiVelocity * deltaTime,
        controls.minPolarAngle + 0.001,
        controls.maxPolarAngle - 0.001
      );
      inertialSpherical.makeSafe();

      inertialOffset.setFromSpherical(inertialSpherical);
      camera.position.copy(controls.target).add(inertialOffset);
      camera.lookAt(controls.target);

      const decay = Math.exp(-INERTIA_DECAY * deltaTime);
      inertiaThetaVelocity *= decay;
      inertiaPhiVelocity *= decay;
    }

    renderer.domElement.addEventListener('pointerdown', (event) => {
      if (event.button !== 0 || !globePointFromRay(event)) return;
      dragState.active = true;
      dragState.pointerId = event.pointerId;
      dragState.lastX = event.clientX;
      dragState.lastY = event.clientY;
      dragState.lastTime = performance.now();
      stopOrbitSpin();
    });

    renderer.domElement.addEventListener('pointermove', (event) => {
      if (!dragState.active || event.pointerId !== dragState.pointerId) return;
      updateInertialVelocity(event);
    });

    function finishDrag(event) {
      if (!dragState.active || event.pointerId !== dragState.pointerId) return;
      dragState.active = false;
      dragState.pointerId = null;
      dragState.lastTime = 0;
    }

    renderer.domElement.addEventListener('pointerup', finishDrag);
    renderer.domElement.addEventListener('pointercancel', finishDrag);

    const globeGroup = new THREE.Group();
    scene.add(globeGroup);

    scene.add(new THREE.AmbientLight(0xffffff, 1.18));
    const hemi = new THREE.HemisphereLight(0xc7d8e8, 0x0d1721, 1.18);
    scene.add(hemi);
    const mainLight = new THREE.DirectionalLight(0xffffff, 1.42);
    mainLight.position.set(3.8, 2.2, 3.1);
    scene.add(mainLight);
    const fillLight = new THREE.DirectionalLight(0x87a5c0, 0.38);
    fillLight.position.set(-2.8, -1.4, -2.1);
    scene.add(fillLight);

    const OCEAN_COLOR = '#516d85';
    const LAND_COLOR = '#384f64';
    const LOGO_TINT = 'rgba(230, 238, 246, 0.95)';

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }

    function latLonToVector3(lat, lon, radius = 1) {
      const phi = THREE.MathUtils.degToRad(90 - lat);
      const theta = THREE.MathUtils.degToRad(lon);
      return new THREE.Vector3(
        radius * Math.sin(phi) * Math.cos(theta),
        radius * Math.cos(phi),
        radius * Math.sin(phi) * Math.sin(theta)
      );
    }

    function latLonToCanvas(lat, lon, width, height) {
      const x = ((180 - lon) / 360) * width;
      const y = ((90 - lat) / 180) * height;
      return { x, y };
    }

    function centroidLatLon(points) {
      let lat = 0;
      let lon = 0;
      for (const p of points) {
        lat += p.lat;
        lon += p.lon;
      }
      return { lat: lat / points.length, lon: lon / points.length };
    }

    function pointInPolygon(lon, lat, polygon) {
      let inside = false;
      for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
        const xi = polygon[i].lon;
        const yi = polygon[i].lat;
        const xj = polygon[j].lon;
        const yj = polygon[j].lat;
        const intersect = ((yi > lat) !== (yj > lat)) &&
          (lon < ((xj - xi) * (lat - yi)) / ((yj - yi) || 1e-8) + xi);
        if (intersect) inside = !inside;
      }
      return inside;
    }

    function getCampaignAtLatLon(lat, lon) {
      for (const campaign of CAMPAIGNS) {
        if (pointInPolygon(lon, lat, campaign.smoothPolygon)) return campaign;
      }
      return null;
    }

    function chaikinSmooth(points, iterations = 4) {
      let pts = points.map((p) => ({ lat: p.lat, lon: p.lon }));
      for (let iter = 0; iter < iterations; iter++) {
        const next = [];
        for (let i = 0; i < pts.length; i++) {
          const p0 = pts[i];
          const p1 = pts[(i + 1) % pts.length];
          next.push({
            lat: p0.lat * 0.75 + p1.lat * 0.25,
            lon: p0.lon * 0.75 + p1.lon * 0.25
          });
          next.push({
            lat: p0.lat * 0.25 + p1.lat * 0.75,
            lon: p0.lon * 0.25 + p1.lon * 0.75
          });
        }
        pts = next;
      }
      return pts;
    }

    function traceCanvasPath(ctx, canvasPoints) {
      if (!canvasPoints.length) return;
      ctx.beginPath();
      ctx.moveTo(canvasPoints[0].x, canvasPoints[0].y);
      for (let i = 1; i < canvasPoints.length; i++) {
        ctx.lineTo(canvasPoints[i].x, canvasPoints[i].y);
      }
      ctx.closePath();
    }

    function boundsForCanvasPoints(points) {
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for (const p of points) {
        if (p.x < minX) minX = p.x;
        if (p.y < minY) minY = p.y;
        if (p.x > maxX) maxX = p.x;
        if (p.y > maxY) maxY = p.y;
      }
      return {
        minX, minY, maxX, maxY,
        width: maxX - minX,
        height: maxY - minY,
        cx: (minX + maxX) / 2,
        cy: (minY + maxY) / 2
      };
    }

    function makeLogoCanvas(wordmarkImage, subtitle) {
      const off = document.createElement('canvas');
      off.width = 1600;
      off.height = 900;
      const ctx = off.getContext('2d');
      ctx.clearRect(0, 0, off.width, off.height);

      const wordmarkTargetWidth = off.width * 0.78;
      const wordmarkRatio = wordmarkImage.height / wordmarkImage.width;
      const wordmarkHeight = wordmarkTargetWidth * wordmarkRatio;
      const wordmarkX = (off.width - wordmarkTargetWidth) / 2;
      const wordmarkY = off.height * 0.12;

      ctx.drawImage(wordmarkImage, wordmarkX, wordmarkY, wordmarkTargetWidth, wordmarkHeight);
      ctx.globalCompositeOperation = 'source-in';
      ctx.fillStyle = LOGO_TINT;
      ctx.fillRect(0, 0, off.width, off.height);
      ctx.globalCompositeOperation = 'source-over';

      ctx.fillStyle = LOGO_TINT;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = 'italic 700 126px Arial, Helvetica, sans-serif';
      ctx.letterSpacing = '3px';
      ctx.fillText(subtitle, off.width / 2, off.height * 0.70);

      return off;
    }

    function drawContinentWithLogo(ctx, campaign, logoCanvas) {
      traceCanvasPath(ctx, campaign.canvasPoints);
      ctx.fillStyle = LAND_COLOR;
      ctx.fill();

      ctx.save();
      traceCanvasPath(ctx, campaign.canvasPoints);
      ctx.clip();
      ctx.globalAlpha = 0.40;

      const b = campaign.canvasBounds;
      let drawWidth = Math.max(b.width * 1.45, b.height * 2.1);
      let drawHeight = drawWidth * (logoCanvas.height / logoCanvas.width);
      const minHeight = b.height * 1.18;
      if (drawHeight < minHeight) {
        drawHeight = minHeight;
        drawWidth = drawHeight * (logoCanvas.width / logoCanvas.height);
      }
      const offsetX = (campaign.logoBias?.x || 0) * b.width;
      const offsetY = (campaign.logoBias?.y || 0) * b.height;
      ctx.drawImage(
        logoCanvas,
        b.cx - drawWidth / 2 + offsetX,
        b.cy - drawHeight / 2 + offsetY,
        drawWidth,
        drawHeight
      );
      ctx.restore();
    }

    function buildTextures(wordmarkImage) {
      const width = 2048;
      const height = 1024;
      const colorCanvas = document.createElement('canvas');
      colorCanvas.width = width;
      colorCanvas.height = height;
      const colorCtx = colorCanvas.getContext('2d');

      const bumpCanvas = document.createElement('canvas');
      bumpCanvas.width = width;
      bumpCanvas.height = height;
      const bumpCtx = bumpCanvas.getContext('2d');

      colorCtx.fillStyle = OCEAN_COLOR;
      colorCtx.fillRect(0, 0, width, height);

      bumpCtx.fillStyle = 'rgb(80,80,80)';
      bumpCtx.fillRect(0, 0, width, height);

      for (const campaign of CAMPAIGNS) {
        campaign.smoothPolygon = chaikinSmooth(campaign.polygon, 4);
        campaign.canvasPoints = campaign.smoothPolygon.map((p) => latLonToCanvas(p.lat, p.lon, width, height));
        campaign.canvasBounds = boundsForCanvasPoints(campaign.canvasPoints);
        campaign.logoCanvas = makeLogoCanvas(wordmarkImage, campaign.logoSubtitle);

        colorCtx.save();
        colorCtx.filter = 'blur(20px)';
        colorCtx.fillStyle = LAND_COLOR;
        traceCanvasPath(colorCtx, campaign.canvasPoints);
        colorCtx.fill();
        colorCtx.restore();

        drawContinentWithLogo(colorCtx, campaign, campaign.logoCanvas);

        bumpCtx.save();
        bumpCtx.filter = 'blur(18px)';
        bumpCtx.fillStyle = 'rgb(160,160,160)';
        traceCanvasPath(bumpCtx, campaign.canvasPoints);
        bumpCtx.fill();
        bumpCtx.restore();

        bumpCtx.fillStyle = 'rgb(214,214,214)';
        traceCanvasPath(bumpCtx, campaign.canvasPoints);
        bumpCtx.fill();
      }

      const map = new THREE.CanvasTexture(colorCanvas);
      map.colorSpace = THREE.SRGBColorSpace;
      map.wrapS = THREE.RepeatWrapping;
      map.wrapT = THREE.ClampToEdgeWrapping;
      map.anisotropy = renderer.capabilities.getMaxAnisotropy();

      const bumpMap = new THREE.CanvasTexture(bumpCanvas);
      bumpMap.wrapS = THREE.RepeatWrapping;
      bumpMap.wrapT = THREE.ClampToEdgeWrapping;
      bumpMap.anisotropy = renderer.capabilities.getMaxAnisotropy();

      return { map, bumpMap };
    }

    const baseMaterial = new THREE.MeshStandardMaterial({
      color: 0x516d85,
      roughness: 0.96,
      metalness: 0.02
    });

    const globe = new THREE.Mesh(new THREE.SphereGeometry(1, 180, 128), baseMaterial);
    globeGroup.add(globe);

    const rim = new THREE.Mesh(
      new THREE.SphereGeometry(1.045, 96, 72),
      new THREE.MeshBasicMaterial({
        color: 0x7a97b3,
        transparent: true,
        opacity: 0.07,
        side: THREE.BackSide
      })
    );
    globeGroup.add(rim);

    const starsGeometry = new THREE.BufferGeometry();
    const starVerts = [];
    for (let i = 0; i < 700; i++) {
      const r = THREE.MathUtils.randFloat(12, 24);
      const theta = THREE.MathUtils.randFloat(0, Math.PI * 2);
      const u = THREE.MathUtils.randFloat(-1, 1);
      const phi = Math.acos(u);
      starVerts.push(
        r * Math.sin(phi) * Math.cos(theta),
        r * Math.cos(phi),
        r * Math.sin(phi) * Math.sin(theta)
      );
    }
    starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
    const stars = new THREE.Points(
      starsGeometry,
      new THREE.PointsMaterial({ size: 0.04, color: 0xcad8e6, transparent: true, opacity: 0.0 })
    );
    scene.add(stars);

    function createOutline(campaign) {
      const points = campaign.smoothPolygon.map((p) => latLonToVector3(p.lat, p.lon, 1.013));
      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      const material = new THREE.LineBasicMaterial({
        color: 0xe7eef5,
        transparent: true,
        opacity: 0
      });
      const line = new THREE.LineLoop(geometry, material);
      globeGroup.add(line);
      return line;
    }

    const labelEntries = new Map();

    function initializeCampaignGeometry() {
      for (const campaign of CAMPAIGNS) {
        if (!campaign.smoothPolygon) {
          campaign.smoothPolygon = chaikinSmooth(campaign.polygon, 4);
        }
        const centroid = centroidLatLon(campaign.smoothPolygon);
        campaign.centroid = centroid;
        const labelLat = centroid.lat + (campaign.labelShift?.lat || 0);
        const labelLon = centroid.lon + (campaign.labelShift?.lon || 0);
        campaign.labelAnchor = latLonToVector3(labelLat, labelLon, 1.13);
        campaign.outline = createOutline(campaign);

        const label = document.createElement('div');
        label.className = 'map-label';
        label.textContent = campaign.name;
        labelsLayer.appendChild(label);
        labelEntries.set(campaign.id, label);
      }
    }

    let hoveredCampaign = null;
    let selectedCampaign = null;

    const CAMERA_FORWARD = new THREE.Vector3();
    const CAMERA_UP = new THREE.Vector3();
    const CAMERA_RIGHT = new THREE.Vector3();
    const CAMERA_BASIS = new THREE.Matrix4();
    const CAMERA_FRAME = new THREE.Quaternion();
    const FOCUS_LOCAL_UP = new THREE.Vector3();
    const FOCUS_LOCAL_RIGHT = new THREE.Vector3();
    const FOCUS_LOCAL_BASIS = new THREE.Matrix4();
    const FOCUS_LOCAL_FRAME = new THREE.Quaternion();
    const FOCUS_PATH_DELTA = new THREE.Quaternion();
    const FOCUS_PATH_STEP = new THREE.Quaternion();
    const FOCUS_POINT = new THREE.Vector3();
    const GLOBE_INVERSE = new THREE.Quaternion();
    const LOCAL_NORTH = new THREE.Vector3(0, 1, 0);
    const LOCAL_EAST_FALLBACK = new THREE.Vector3(0, 0, 1);

    const focusRotation = {
      active: false,
      startTime: 0,
      duration: 500,
      fromPoint: new THREE.Vector3(),
      toPoint: new THREE.Vector3(),
      path: new THREE.Quaternion()
    };

    function activeCampaign() {
      return hoveredCampaign || selectedCampaign;
    }

    function stopFocusRotation() {
      focusRotation.active = false;
    }

    function worldDirectionForCampaign(campaign) {
      return latLonToVector3(campaign.centroid.lat, campaign.centroid.lon)
        .applyQuaternion(globeGroup.quaternion)
        .normalize();
    }

    function buildCameraFrameQuaternion() {
      CAMERA_FORWARD.copy(camera.position).sub(controls.target).normalize();
      CAMERA_UP.copy(camera.up).projectOnPlane(CAMERA_FORWARD).normalize();
      CAMERA_RIGHT.copy(CAMERA_UP).cross(CAMERA_FORWARD).normalize();
      CAMERA_UP.copy(CAMERA_FORWARD).cross(CAMERA_RIGHT).normalize();
      CAMERA_BASIS.makeBasis(CAMERA_RIGHT, CAMERA_UP, CAMERA_FORWARD);
      return CAMERA_FRAME.setFromRotationMatrix(CAMERA_BASIS);
    }

    function currentFocusPoint() {
      return CAMERA_FORWARD.copy(camera.position)
        .sub(controls.target)
        .normalize()
        .applyQuaternion(GLOBE_INVERSE.copy(globeGroup.quaternion).invert())
        .normalize();
    }

    function setGlobeFocusPoint(point) {
      buildCameraFrameQuaternion();
      FOCUS_LOCAL_UP.copy(LOCAL_NORTH).projectOnPlane(point);
      if (FOCUS_LOCAL_UP.lengthSq() < 1e-6) {
        FOCUS_LOCAL_UP.copy(LOCAL_EAST_FALLBACK).projectOnPlane(point);
      }
      FOCUS_LOCAL_UP.normalize();
      FOCUS_LOCAL_RIGHT.copy(FOCUS_LOCAL_UP).cross(point).normalize();
      FOCUS_LOCAL_UP.copy(point).cross(FOCUS_LOCAL_RIGHT).normalize();
      FOCUS_LOCAL_BASIS.makeBasis(FOCUS_LOCAL_RIGHT, FOCUS_LOCAL_UP, point);
      FOCUS_LOCAL_FRAME.setFromRotationMatrix(FOCUS_LOCAL_BASIS).invert();
      globeGroup.quaternion.copy(CAMERA_FRAME).multiply(FOCUS_LOCAL_FRAME).normalize();
    }

    function startFocusRotation(campaign) {
      focusRotation.fromPoint.copy(currentFocusPoint());
      focusRotation.toPoint.copy(latLonToVector3(campaign.centroid.lat, campaign.centroid.lon)).normalize();
      focusRotation.path.setFromUnitVectors(focusRotation.fromPoint, focusRotation.toPoint);
      focusRotation.startTime = performance.now();
      focusRotation.active = true;
    }

    function updateFocusRotation(now) {
      if (!focusRotation.active) return;

      const progress = Math.min((now - focusRotation.startTime) / focusRotation.duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      FOCUS_PATH_STEP.slerpQuaternions(new THREE.Quaternion(), focusRotation.path, eased);
      FOCUS_POINT.copy(focusRotation.fromPoint).applyQuaternion(FOCUS_PATH_STEP).normalize();
      setGlobeFocusPoint(FOCUS_POINT);

      if (progress >= 1) {
        setGlobeFocusPoint(focusRotation.toPoint);
        focusRotation.active = false;
      }
    }

    function updateVisualState() {
      const active = activeCampaign();
      for (const campaign of CAMPAIGNS) {
        const isActive = active && campaign.id === active.id;
        campaign.outline.material.opacity = isActive ? 0.96 : 0;
        const label = labelEntries.get(campaign.id);
        label.classList.toggle('active', Boolean(isActive));
      }
    }

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    function globePointFromRay(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObject(globe);
      return hits.length ? globe.worldToLocal(hits[0].point.clone()).normalize() : null;
    }

    function campaignFromRay(event) {
      const point = globePointFromRay(event);
      if (!point) return null;
      const lat = 90 - THREE.MathUtils.radToDeg(Math.acos(point.y));
      const lon = THREE.MathUtils.radToDeg(Math.atan2(point.z, point.x));
      return getCampaignAtLatLon(lat, lon);
    }

    renderer.domElement.addEventListener('pointermove', (event) => {
      if (dragState.active) return;
      hoveredCampaign = campaignFromRay(event);
      renderer.domElement.style.cursor = hoveredCampaign ? 'pointer' : 'grab';
      updateVisualState();
    });

    renderer.domElement.addEventListener('pointerleave', () => {
      hoveredCampaign = null;
      renderer.domElement.style.cursor = 'grab';
      updateVisualState();
    });

    renderer.domElement.addEventListener('pointerdown', (event) => {
      if (!globePointFromRay(event)) return;
      stopOrbitSpin();
      stopFocusRotation();
      controls.update();
    });

    renderer.domElement.addEventListener('click', (event) => {
      selectedCampaign = campaignFromRay(event);
      hoveredCampaign = selectedCampaign;
      if (selectedCampaign) startFocusRotation(selectedCampaign);
      updateVisualState();
    });

    function updateLabels() {
      const cameraDir = camera.position.clone().normalize();
      const width = window.innerWidth;
      const height = window.innerHeight;
      const active = activeCampaign();

      for (const campaign of CAMPAIGNS) {
        const label = labelEntries.get(campaign.id);
        const worldAnchor = campaign.labelAnchor.clone().applyQuaternion(globeGroup.quaternion);
        const pointDir = worldAnchor.clone().normalize();
        const facing = pointDir.dot(cameraDir) > 0.02;
        if (!facing) {
          label.classList.add('hidden');
          continue;
        }

        label.classList.remove('hidden');
        const projected = worldAnchor.project(camera);
        const x = (projected.x * 0.5 + 0.5) * width;
        const y = (-projected.y * 0.5 + 0.5) * height;
        const isActive = active && campaign.id === active.id;
        label.style.left = `${x}px`;
        label.style.top = `${y + (isActive ? -16 : 0)}px`;
      }
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
    window.addEventListener('resize', onResize);

    initializeCampaignGeometry();
    updateVisualState();

    try {
      const wordmarkImage = await loadImage(WORDMARK_URL);
      const { map, bumpMap } = buildTextures(wordmarkImage);
      globe.material.map = map;
      globe.material.bumpMap = bumpMap;
      globe.material.bumpScale = 0.05;
      globe.material.needsUpdate = true;
    } catch (error) {
      console.warn('Failed to load wordmark/logo asset, continuing without embedded logos.', error);
      const fallbackWordmark = document.createElement('canvas');
      fallbackWordmark.width = 1200;
      fallbackWordmark.height = 360;
      const fctx = fallbackWordmark.getContext('2d');
      fctx.fillStyle = '#ffffff';
      fctx.font = 'italic 900 150px Arial, Helvetica, sans-serif';
      fctx.textAlign = 'center';
      fctx.textBaseline = 'middle';
      fctx.fillText('TRACKMANIA', fallbackWordmark.width / 2, fallbackWordmark.height / 2);
      const { map, bumpMap } = buildTextures(fallbackWordmark);
      globe.material.map = map;
      globe.material.bumpMap = bumpMap;
      globe.material.bumpScale = 0.05;
      globe.material.needsUpdate = true;
    }

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const deltaTime = Math.min(clock.getDelta(), 0.05);
      const t = clock.elapsedTime;
      stars.rotation.y = t * 0.01;
      rim.rotation.y = -t * 0.015;
      applyInertialSpin(deltaTime);
      updateFocusRotation(performance.now());
      controls.update();
      updateLabels();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
